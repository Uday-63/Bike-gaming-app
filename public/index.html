<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Racing</title>
    <style>
        /* Base Reset & App Container */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #111; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        #game-app {
            width: 100%;
            max-width: 800px;
            height: 100vh;
            max-height: 450px; /* Mobile landscape view */
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            position: relative;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* Screens */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
        }
        .active { display: flex; }

        /* Headings */
        h1 { font-size: 3rem; text-shadow: 0 0 10px #ff0055; margin-bottom: 20px; text-transform: uppercase; font-style: italic; }
        h2 { font-size: 2rem; margin-bottom: 20px; color: #00ffcc; }

        /* Buttons */
        .btn {
            background: linear-gradient(90deg, #ff0055, #ff5500);
            color: white;
            border: none;
            padding: 12px 30px;
            margin: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(255, 0, 85, 0.4);
        }
        .btn:hover { transform: scale(1.1); box-shadow: 0 5px 25px rgba(255, 0, 85, 0.7); }
        .back-btn { background: #333; box-shadow: none; position: absolute; top: 15px; left: 15px; }

        /* Garage Styles */
        .bike-list { display: flex; gap: 20px; margin-bottom: 20px; }
        .bike-card {
            background: #222; border: 2px solid #444; border-radius: 10px;
            padding: 20px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .bike-card:hover, .bike-card.selected { border-color: #00ffcc; background: #333; transform: translateY(-10px); }
        .bike-card h3 { margin-bottom: 10px; font-size: 1.2rem; }
        .bike-emoji { font-size: 4rem; }

        /* Settings Styles */
        .setting-item { display: flex; justify-content: space-between; width: 300px; margin: 10px 0; font-size: 1.2rem; background: #222; padding: 15px; border-radius: 10px; }

        /* Game Area */
        #game-area { background: #333; /* Road color placeholder */ border-bottom: 5px solid white; position: relative;}
        .road-lines { width: 100%; height: 5px; background: dashed white 20px; position: absolute; top: 50%; animation: moveRoad 1s linear infinite; }
        #player-bike { font-size: 5rem; position: absolute; left: 10%; top: 40%; transition: top 0.2s; }
        .game-ui { position: absolute; top: 15px; left: 20px; font-size: 1.2rem; font-weight: bold; color: yellow; }

        @keyframes moveRoad {
            from { background-position: 0 0; }
            to { background-position: -100px 0; }
        }
    </style>
</head>
<body>

<div id="game-app">

    <div id="main-menu" class="screen active">
        <h1>Uday Bike Racing</h1>
        <button class="btn" onclick="startGame()">🏁 Start Race</button>
        <button class="btn" onclick="showScreen('garage')">🏍 Garage (Bikes)</button>
        <button class="btn" onclick="showScreen('settings')">⚙ Settings</button>
    </div>

    <div id="garage" class="screen">
        <button class="btn back-btn" onclick="showScreen('main-menu')">⬅ Back</button>
        <h2>Select Your Bike</h2>
        <div class="bike-list">
            <div class="bike-card selected" onclick="selectBike(this, '🏍')">
                <h3>Sports Bike</h3>
                <div class="bike-emoji">🏍</div>
            </div>
            <div class="bike-card" onclick="selectBike(this, '🛵')">
                <h3>Scooter</h3>
                <div class="bike-emoji">🛵</div>
            </div>
            <div class="bike-card" onclick="selectBike(this, '🚲')">
                <h3>BMX</h3>
                <div class="bike-emoji">🚲</div>
            </div>
        </div>
    </div>

    <div id="settings" class="screen">
        <button class="btn back-btn" onclick="showScreen('main-menu')">⬅ Back</button>
        <h2>Settings</h2>
        <div class="setting-item">
            <span>Music Volume</span>
            <input type="range" min="0" max="100" value="50">
        </div>
        <div class="setting-item">
            <span>SFX Volume</span>
            <input type="range" min="0" max="100" value="80">
        </div>
        <div class="setting-item">
            <span>Graphics</span>
            <select style="padding: 5px; background:#444; color:white; border:none; border-radius:5px;">
                <option>High</option>
                <option>Medium</option>
                <option>Low</option>
            </select>
        </div>
    </div>

    <div id="game-area" class="screen">
        <div class="game-ui">SCORE: <span id="score">0</span></div>
        <div class="road-lines"></div>
        <div id="player-bike">🏍</div>
        <button class="btn back-btn" onclick="stopGame()" style="z-index: 10;">⬅ Quit</button>
    </div>

</div>

<script>
    let currentBike = '🏍';
    let score = 0;
    let gameInterval;

    // Screen Switching Logic
    function showScreen(screenId) {
        // Hide all screens
        const screens = document.querySelectorAll('.screen');
        screens.forEach(screen => screen.classList.remove('active'));
        
        // Show target screen
        document.getElementById(screenId).classList.add('active');
    }

    // Bike Selection Logic
    function selectBike(element, bikeEmoji) {
        // Remove 'selected' class from all bikes
        const cards = document.querySelectorAll('.bike-card');
        cards.forEach(card => card.classList.remove('selected'));
        
        // Add 'selected' to clicked bike
        element.classList.add('selected');
        
        // Update the global bike variable
        currentBike = bikeEmoji;
    }

    // Start Game Logic
    function startGame() {
        showScreen('game-area');
        document.getElementById('player-bike').innerText = currentBike;
        score = 0;
        document.getElementById('score').innerText = score;
        
        // Simple score counter to simulate gameplay
        gameInterval = setInterval(() => {
            score += 10;
            document.getElementById('score').innerText = score;
        }, 100);
    }

    // Stop Game Logic
    function stopGame() {
        clearInterval(gameInterval);
        showScreen('main-menu');
    }

</script>
</body>
</html>
